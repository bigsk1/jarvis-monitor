services:
  jarvis-monitor:
    # Build the image from the Dockerfile locally when testing changes, we do have a dockerhub image bigsk1/jarvis-monitor:latest this is built on windows desktop wsl only! and pushed to dockerhub
    build:
      context: .
      dockerfile: Dockerfile
    image: jarvis-monitor:local
    container_name: jarvis-monitor
    restart: unless-stopped
    
    # Load environment variables from .env file
    env_file:
      - .env
    
    volumes:
      # Mount Docker socket to monitor containers
      # READ-ONLY for security
      - /var/run/docker.sock:/var/run/docker.sock:ro
    
    networks:
      - monitoring
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  monitoring:
    driver: bridge
